<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenFlow Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            height: calc(100vh - 180px);
        }
        .message-enter {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-indicator span {
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-gray-900 text-white flex flex-col">
            <!-- Logo -->
            <div class="p-4 border-b border-gray-700">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg gradient-bg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg">GenFlow Studio</h1>
                        <p class="text-xs text-gray-400">AI Platform</p>
                    </div>
                </div>
            </div>

            <!-- New Chat Button -->
            <div class="p-4">
                <button onclick="newChat()" class="w-full py-2.5 px-4 border border-gray-600 rounded-lg hover:bg-gray-800 transition-colors flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    New Chat
                </button>
            </div>

            <!-- Model Selector -->
            <div class="px-4 pb-4">
                <label class="block text-sm font-medium text-gray-400 mb-2">AI Model</label>
                <select id="modelSelect" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option th:each="model : ${models}" th:value="${model.id()}" th:text="${model.name()}"></option>
                    <option value="image-generator">Image Generator (FLUX)</option>
                </select>
                <p id="modelHint" class="mt-2 text-xs text-gray-500">Select a model for your task</p>
            </div>

            <!-- Image Options (shown when image model selected) -->
            <div id="imageOptions" class="px-4 pb-4 hidden">
                <label class="block text-sm font-medium text-gray-400 mb-2">Negative Prompt (optional)</label>
                <input type="text" id="negativePrompt" placeholder="Things to avoid..." 
                    class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:ring-2 focus:ring-primary focus:border-transparent mb-3">
                <label class="block text-sm font-medium text-gray-400 mb-2">Image Size</label>
                <select id="imageSize" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="512">512 x 512</option>
                    <option value="768">768 x 768</option>
                </select>
            </div>

            <!-- Chat History -->
            <div class="flex-1 overflow-y-auto scrollbar-thin px-4">
                <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-3">History</p>
                <div id="chatHistory" class="space-y-2">
                    <!-- Chat history items will be added here -->
                </div>
            </div>

            <!-- Footer -->
            <div class="p-4 border-t border-gray-700">
                <div class="text-xs text-gray-500">
                    <p class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        API Connected
                    </p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-white dark:bg-gray-800">
            <!-- Header -->
            <header class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 id="chatTitle" class="text-lg font-semibold text-gray-900 dark:text-white">New Conversation</h2>
                        <p id="chatModelName" class="text-sm text-gray-500 dark:text-gray-400">General Chat (Phi-4)</p>
                    </div>
                    <button onclick="clearChat()" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages -->
            <div id="chatMessages" class="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-thin chat-container">
                <!-- Welcome Message -->
                <div id="welcomeMessage" class="flex flex-col items-center justify-center h-full text-center">
                    <div class="w-16 h-16 rounded-2xl gradient-bg flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                        </svg>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">How can I help you today?</h3>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md mb-6">
                        Choose a model from the sidebar: Chat for conversations, or Image Generator for AI art.
                    </p>
                    <div class="grid grid-cols-2 gap-3 max-w-lg">
                        <button onclick="setExample('Explain quantum computing in simple terms')" class="p-3 text-left bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">
                            <p class="text-sm font-medium text-gray-900 dark:text-white">Explain quantum computing</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">in simple terms</p>
                        </button>
                        <button onclick="setExample('Write a haiku about programming')" class="p-3 text-left bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors">
                            <p class="text-sm font-medium text-gray-900 dark:text-white">Write a haiku</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">about programming</p>
                        </button>
                        <button onclick="selectImageAndSetExample('A futuristic city at sunset, cyberpunk style')" class="p-3 text-left bg-purple-50 dark:bg-purple-900/20 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/30 transition-colors border border-purple-200 dark:border-purple-800">
                            <p class="text-sm font-medium text-purple-900 dark:text-purple-200">Generate Image</p>
                            <p class="text-xs text-purple-600 dark:text-purple-400">cyberpunk city</p>
                        </button>
                        <button onclick="selectImageAndSetExample('A cute robot reading a book in a cozy library')" class="p-3 text-left bg-purple-50 dark:bg-purple-900/20 rounded-lg hover:bg-purple-100 dark:hover:bg-purple-900/30 transition-colors border border-purple-200 dark:border-purple-800">
                            <p class="text-sm font-medium text-purple-900 dark:text-purple-200">Generate Image</p>
                            <p class="text-xs text-purple-600 dark:text-purple-400">cute robot reading</p>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="px-6 py-4 border-t border-gray-200 dark:border-gray-700">
                <form id="chatForm" onsubmit="sendMessage(event)" class="flex gap-4">
                    <div class="flex-1 relative">
                        <textarea 
                            id="messageInput" 
                            rows="1"
                            placeholder="Type your message..."
                            class="w-full resize-none rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 px-4 py-3 pr-12 text-gray-900 dark:text-white placeholder-gray-500 focus:ring-2 focus:ring-primary focus:border-transparent"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                        <button 
                            type="submit" 
                            id="sendButton"
                            class="absolute right-2 bottom-2 p-2 text-white bg-primary hover:bg-indigo-600 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                            </svg>
                        </button>
                    </div>
                </form>
                <p class="mt-2 text-xs text-center text-gray-500 dark:text-gray-400">
                    Press Enter to send, Shift+Enter for new line
                </p>
            </div>
        </main>
    </div>

    <script>
        // State
        let chatHistory = [];
        let currentChatId = null;
        let isLoading = false;

        // DOM Elements
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const modelSelect = document.getElementById('modelSelect');
        const modelHint = document.getElementById('modelHint');
        const chatTitle = document.getElementById('chatTitle');
        const chatModelName = document.getElementById('chatModelName');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const sendButton = document.getElementById('sendButton');
        const historyContainer = document.getElementById('chatHistory');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            updateModelHint();
            modelSelect.addEventListener('change', updateModelHint);
            autoResizeTextarea();
        });

        function updateModelHint() {
            const selectedOption = modelSelect.options[modelSelect.selectedIndex];
            const modelName = selectedOption.text;
            chatModelName.textContent = modelName;
            
            const imageOptions = document.getElementById('imageOptions');
            const isImageModel = modelSelect.value === 'image-generator';
            
            if (isImageModel) {
                modelHint.textContent = 'Generate images from text descriptions';
                imageOptions.classList.remove('hidden');
                messageInput.placeholder = 'Describe the image you want to generate...';
            } else if (modelSelect.value.includes('Qwen')) {
                modelHint.textContent = 'Best for summarizing long text';
                imageOptions.classList.add('hidden');
                messageInput.placeholder = 'Type your message...';
            } else {
                modelHint.textContent = 'Best for general conversations';
                imageOptions.classList.add('hidden');
                messageInput.placeholder = 'Type your message...';
            }
        }

        function autoResizeTextarea() {
            messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            });
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage(event);
            }
        }

        function setExample(text) {
            messageInput.value = text;
            messageInput.focus();
        }

        function selectImageAndSetExample(text) {
            modelSelect.value = 'image-generator';
            updateModelHint();
            messageInput.value = text;
            messageInput.focus();
        }

        async function sendMessage(event) {
            event.preventDefault();
            
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            const model = modelSelect.value;
            const isImageGeneration = model === 'image-generator';
            
            // Hide welcome message
            if (welcomeMessage) {
                welcomeMessage.style.display = 'none';
            }

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // Show loading
            setLoading(true);
            const loadingId = isImageGeneration ? showImageLoadingIndicator() : showTypingIndicator();

            try {
                if (isImageGeneration) {
                    await generateImage(message, loadingId);
                } else {
                    await sendChatMessage(message, model, loadingId);
                }
            } catch (error) {
                removeTypingIndicator(loadingId);
                addMessage('Network error. Please check your connection and try again.', 'error');
                console.error('Error:', error);
            } finally {
                setLoading(false);
            }
        }

        async function sendChatMessage(message, model, loadingId) {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message, model }),
            });

            const data = await response.json();
            
            // Remove typing indicator
            removeTypingIndicator(loadingId);

            if (data.success) {
                addMessage(data.message, 'assistant');
                updateChatTitle(message);
                saveToHistory(message, data.message, model);
            } else {
                addMessage(data.error || 'An error occurred. Please try again.', 'error');
            }
        }

        async function generateImage(prompt, loadingId) {
            const negativePrompt = document.getElementById('negativePrompt').value.trim();
            const imageSize = parseInt(document.getElementById('imageSize').value);

            try {
                const response = await fetch('/api/image', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        negativePrompt: negativePrompt || null,
                        width: imageSize,
                        height: imageSize
                    }),
                });

                removeTypingIndicator(loadingId);

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorMessage = 'Failed to generate image.';
                    
                    if (response.status === 503) {
                        errorMessage = 'Model is loading. Please wait a few seconds and try again.';
                    } else if (response.status === 429) {
                        errorMessage = 'Rate limit exceeded. Please wait a moment.';
                    } else {
                        try {
                            const errorJson = JSON.parse(errorText);
                            errorMessage = errorJson.error || errorMessage;
                        } catch (e) {
                            // Use default error message
                        }
                    }
                    
                    addMessage(errorMessage, 'error');
                    return;
                }

                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                addImageMessage(imageUrl, prompt);
                updateChatTitle('Image: ' + prompt);
                
            } catch (error) {
                removeTypingIndicator(loadingId);
                console.error('Image generation error:', error);
                addMessage('Failed to generate image. Please try again.', 'error');
            }
        }

        function addImageMessage(imageUrl, prompt) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex gap-4 message-enter';
            
            messageDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="flex-1 bg-gray-50 dark:bg-gray-700 rounded-2xl px-4 py-3">
                    <img src="${imageUrl}" alt="${escapeHtml(prompt)}" 
                        class="max-w-full rounded-lg shadow-lg mb-3" 
                        style="max-height: 512px;">
                    <div class="flex items-center gap-3">
                        <a href="${imageUrl}" download="generated-image.png" 
                            class="inline-flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg hover:bg-indigo-600 transition-colors text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                            </svg>
                            Download
                        </a>
                        <span class="text-xs text-gray-500 dark:text-gray-400">
                            Generated image
                        </span>
                    </div>
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showImageLoadingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex gap-4 message-enter';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
                <div class="bg-gray-50 dark:bg-gray-700 rounded-2xl px-4 py-3">
                    <div class="flex items-center gap-3">
                        <svg class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span class="text-sm text-gray-600 dark:text-gray-300">Generating image... This may take 15-30 seconds</span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex gap-4 message-enter';
            
            const isUser = type === 'user';
            const isError = type === 'error';
            
            const avatar = isUser 
                ? `<div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                   </div>`
                : `<div class="w-8 h-8 rounded-full ${isError ? 'bg-red-500' : 'gradient-bg'} flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        ${isError 
                            ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>'
                            : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>'
                        }
                    </svg>
                   </div>`;

            const bgClass = isUser 
                ? 'bg-indigo-50 dark:bg-indigo-900/20' 
                : isError 
                    ? 'bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-200'
                    : 'bg-gray-50 dark:bg-gray-700';

            messageDiv.innerHTML = `
                ${avatar}
                <div class="flex-1 ${bgClass} rounded-2xl px-4 py-3">
                    <p class="text-gray-800 dark:text-gray-200 whitespace-pre-wrap">${escapeHtml(content)}</p>
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex gap-4 message-enter';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full gradient-bg flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                </div>
                <div class="bg-gray-50 dark:bg-gray-700 rounded-2xl px-4 py-3">
                    <div class="typing-indicator flex gap-1">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
        }

        function setLoading(loading) {
            isLoading = loading;
            sendButton.disabled = loading;
            messageInput.disabled = loading;
        }

        function updateChatTitle(message) {
            const title = message.length > 30 ? message.substring(0, 30) + '...' : message;
            chatTitle.textContent = title;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function newChat() {
            currentChatId = null;
            chatTitle.textContent = 'New Conversation';
            chatMessages.innerHTML = '';
            
            // Restore welcome message
            chatMessages.innerHTML = `
                <div id="welcomeMessage" class="flex flex-col items-center justify-center h-full text-center">
                    <div class="w-16 h-16 rounded-2xl gradient-bg flex items-center justify-center mb-4">

        function clearChat() {
            chatMessages.innerHTML = '';
            chatTitle.textContent = 'New Conversation';
            newChat();
        }

        function saveToHistory(userMessage, aiResponse, model) {
            const chatId = currentChatId || Date.now().toString();
            currentChatId = chatId;
            
            const historyItem = {
                id: chatId,
                title: userMessage.length > 25 ? userMessage.substring(0, 25) + '...' : userMessage,
                model: model,
                timestamp: new Date().toISOString()
            };

            // Update or add to history
            const existingIndex = chatHistory.findIndex(h => h.id === chatId);
            if (existingIndex >= 0) {
                chatHistory[existingIndex] = historyItem;
            } else {
                chatHistory.unshift(historyItem);
                if (chatHistory.length > 10) chatHistory.pop();
            }

            localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
            renderHistory();
        }

        function loadHistory() {
            try {
                chatHistory = JSON.parse(localStorage.getItem('chatHistory') || '[]');
                renderHistory();
            } catch (e) {
                chatHistory = [];
            }
        }

        function renderHistory() {
            historyContainer.innerHTML = chatHistory.map(chat => `
                <button onclick="loadChat('${chat.id}')" class="w-full text-left p-3 rounded-lg hover:bg-gray-800 transition-colors group">
                    <p class="text-sm text-gray-300 truncate">${escapeHtml(chat.title)}</p>
                    <p class="text-xs text-gray-500 mt-1">${new Date(chat.timestamp).toLocaleDateString()}</p>
                </button>
            `).join('');
        }

        function loadChat(chatId) {
            // In a full implementation, this would load the chat from storage
            currentChatId = chatId;
            const chat = chatHistory.find(h => h.id === chatId);
            if (chat) {
                chatTitle.textContent = chat.title;
            }
        }
    </script>
